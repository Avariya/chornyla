name: Bug report
description: Report a problem with conversion, layout, or output
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it? Attach a sample .docx if possible.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 124 on Windows 11
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, G-code snippets, plotter model, etc.
